<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Morning Echo</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #a0a0a0;
            --text-dim: #555555;
            --accent: #1a1a1a;
            --border: #222222;
            --nav-bg: #2a2a2a;
            /* Pastel Palette */
            --pastel-y: #fff9c4;
            --pastel-p: #f8bbd0;
            --pastel-g: #c8e6c9;
            --pastel-b: #e1f5fe;
            --pastel-v: #f3e5f5;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Typography */
        .serif-title {
            font-family: "Iowan Old Style", "Apple Garamond", "Baskerville", "Times New Roman", "Droid Serif", Times, "Source Serif Pro", serif;
            font-style: italic;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        /* Views */
        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 1.5rem;
            position: relative;
        }

        .view.active {
            display: flex;
        }

        /* Navigation Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 1.8rem;
            margin: 0;
            color: #d1d1d1;
        }

        .nav-link {
            font-size: 0.85rem;
            color: #ffffff;
            text-decoration: none;
            cursor: pointer;
            background: var(--nav-bg);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .nav-link:active {
            opacity: 0.7;
        }

        /* Home View (Collections) */
        .collections-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            overflow-y: auto;
            padding-bottom: 2rem;
        }

        .collection-card {
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            display: inline-block;
            cursor: pointer;
            min-width: 100px;
            max-width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .collection-title {
            font-size: 1rem;
            color: #1a1a1a;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .collection-count {
            font-size: 0.6rem;
            color: rgba(0,0,0,0.5);
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Player View */
        #player-view {
            justify-content: center;
            align-items: center;
            text-align: center;
            touch-action: pan-y; /* Prevent vertical scroll during swipe */
        }

        #phrase-display {
            font-size: 1.6rem;
            line-height: 1.6;
            max-width: 600px;
            user-select: none;
            color: #d1d1d1;
            padding: 1rem;
        }

        /* Editor View */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            flex-grow: 1;
        }

        input#col-title {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: #d1d1d1;
            font-size: 1.4rem;
            padding: 0.5rem 0;
            outline: none;
            font-family: inherit;
        }

        textarea {
            flex-grow: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 1rem;
            font-size: 1.1rem;
            font-family: inherit;
            resize: none;
            outline: none;
            border-radius: 8px;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            flex: 1;
            background: var(--nav-bg);
            color: #ffffff;
            border: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .btn.danger {
            background: #331111;
            color: #ff6666;
        }

        /* Meta / Stats */
        .meta-info {
            position: absolute;
            bottom: 4rem;
            color: var(--text-main);
            font-size: 1.4rem; /* Larger font as requested */
            font-weight: 300;
            letter-spacing: 2px;
        }

        .instruction-hint {
            position: absolute;
            bottom: 2rem;
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 4px;
            background: #444;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- HOME VIEW -->
    <div id="home-view" class="view active">
        <div class="header">
            <h1 class="serif-title">Echoes</h1>
            <div class="nav-link" onclick="openEditor()">New Collection</div>
        </div>
        <div id="collections-list" class="collections-list">
            <!-- Cards injected here -->
        </div>
    </div>

    <!-- PLAYER VIEW -->
    <div id="player-view" class="view">
        <div class="progress-bar" id="progress"></div>
        <div class="header" style="position: absolute; top:0; left:1.5rem; right:1.5rem;">
            <div class="nav-link" onclick="showView('home')">← Back</div>
            <div class="nav-link" onclick="openEditor(currentCollectionId)">Edit</div>
        </div>
        
        <div id="phrase-display">Tap to begin</div>
        
        <div class="meta-info" id="stats">0 / 0</div>
        <div class="instruction-hint">Swipe left/right to navigate</div>
    </div>

    <!-- EDITOR VIEW -->
    <div id="editor-view" class="view">
        <div class="header">
            <h1 id="editor-heading" class="serif-title" style="font-size: 1.2rem;">New Collection</h1>
            <div class="nav-link" onclick="showView('home')">Cancel</div>
        </div>
        <div class="input-group">
            <input type="text" id="col-title" placeholder="Title">
            <textarea id="col-content" placeholder="Phrases (one per line)"></textarea>
        </div>
        <div class="actions">
            <button class="btn danger" id="delete-btn" onclick="deleteCollection()">Delete</button>
            <button class="btn" onclick="saveCollection()">Save</button>
        </div>
    </div>

    <script>
        let collections = [];
        let currentCollectionId = null;
        let currentIndex = -1;
        const synth = window.speechSynthesis;
        
        // Touch handling
        let touchStartX = 0;
        let touchEndX = 0;

        const pastelColors = [
            '#fff9c4', // Yellow
            '#f8bbd0', // Pink
            '#c8e6c9', // Green
            '#e1f5fe', // Blue
            '#f3e5f5'  // Violet
        ];

        window.onload = () => {
            const saved = localStorage.getItem('morning_echo_v2');
            if (saved) {
                collections = JSON.parse(saved);
            } else {
                collections = [{
                    id: Date.now(),
                    title: "Fragments",
                    phrases: ["The privilege of a lifetime is to become who you truly are.", "Everything that irritates us about others can lead us to an understanding of ourselves.", "The dream is the small hidden door in the deepest and most intimate sanctum of the soul."]
                }];
                saveToDisk();
            }
            renderHome();
            setupSwipes();
        };

        function setupSwipes() {
            const player = document.getElementById('player-view');
            player.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, {passive: true});

            player.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, {passive: true});

            // Tap fallback for single click advancement
            player.addEventListener('click', (e) => {
                if (!e.target.classList.contains('nav-link')) {
                    // Only advance on click if it wasn't a swipe
                    if (Math.abs(touchEndX - touchStartX) < 10) {
                        navigate(1);
                    }
                }
            });
        }

        function handleSwipe() {
            const threshold = 50;
            if (touchEndX < touchStartX - threshold) navigate(1); // Swipe Left -> Next
            if (touchEndX > touchStartX + threshold) navigate(-1); // Swipe Right -> Prev
        }

        function saveToDisk() {
            localStorage.setItem('morning_echo_v2', JSON.stringify(collections));
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`${viewId}-view`).classList.add('active');
            if (viewId === 'home') {
                renderHome();
                synth.cancel();
            }
        }

        function renderHome() {
            const list = document.getElementById('collections-list');
            list.innerHTML = '';
            collections.forEach((c, index) => {
                const card = document.createElement('div');
                card.className = 'collection-card';
                card.style.backgroundColor = pastelColors[index % pastelColors.length];
                card.onclick = () => startPlayer(c.id);
                card.innerHTML = `
                    <div class="collection-title">${c.title}</div>
                    <div class="collection-count">${c.phrases.length} items</div>
                `;
                list.appendChild(card);
            });
        }

        function openEditor(id = null) {
            currentCollectionId = id;
            const titleInput = document.getElementById('col-title');
            const contentInput = document.getElementById('col-content');
            const deleteBtn = document.getElementById('delete-btn');
            
            if (id) {
                const col = collections.find(c => c.id === id);
                titleInput.value = col.title;
                contentInput.value = col.phrases.join('\n');
                document.getElementById('editor-heading').innerText = "Edit Collection";
                deleteBtn.style.display = 'block';
            } else {
                titleInput.value = '';
                contentInput.value = '';
                document.getElementById('editor-heading').innerText = "New Collection";
                deleteBtn.style.display = 'none';
            }
            showView('editor');
        }

        function saveCollection() {
            const title = document.getElementById('col-title').value.trim() || "Untitled";
            const content = document.getElementById('col-content').value.trim();
            const phrases = content.split('\n').filter(p => p.trim() !== '');

            if (currentCollectionId) {
                const idx = collections.findIndex(c => c.id === currentCollectionId);
                collections[idx] = { ...collections[idx], title, phrases };
            } else {
                collections.push({ id: Date.now(), title, phrases });
            }
            
            saveToDisk();
            showView('home');
        }

        function deleteCollection() {
            if (!currentCollectionId) return;
            collections = collections.filter(c => c.id !== currentCollectionId);
            saveToDisk();
            showView('home');
        }

        function startPlayer(id) {
            currentCollectionId = id;
            currentIndex = -1;
            const col = collections.find(c => c.id === id);
            document.getElementById('phrase-display').innerText = col.title;
            updateStats();
            showView('player');
        }

        function navigate(direction) {
            const col = collections.find(c => c.id === currentCollectionId);
            if (!col || col.phrases.length === 0) return;

            currentIndex += direction;
            
            if (currentIndex < 0) {
                currentIndex = 0;
                return;
            }

            if (currentIndex >= col.phrases.length) {
                currentIndex = col.phrases.length - 1;
                document.getElementById('phrase-display').innerText = "End of Collection";
                speak("End of Collection");
                updateStats();
                return;
            }

            const text = col.phrases[currentIndex];
            document.getElementById('phrase-display').innerText = text;
            speak(text);
            updateStats();
        }

        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85;
            utterance.pitch = 0.9;
            utterance.lang = 'en-US';
            synth.speak(utterance);
        }

        function updateStats() {
            const col = collections.find(c => c.id === currentCollectionId);
            if (!col) return;
            const count = col.phrases.length;
            const current = currentIndex + 1;
            document.getElementById('stats').innerText = `${current > 0 ? current : 0} / ${count}`;
            const progressWidth = count > 0 ? (Math.max(0, current) / count) * 100 : 0;
            document.getElementById('progress').style.width = `${progressWidth}%`;
        }
    </script>
</body>
</html>
