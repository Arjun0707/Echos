<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Morning Echo</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #a0a0a0;
            --text-dim: #555555;
            --accent: #1a1a1a;
            --border: #222222;
            --nav-bg: #2a2a2a;
            
            /* Pastel Palette */
            --pastel-y: #fff9c4;
            --pastel-p: #f8bbd0;
            --pastel-g: #c8e6c9;
            --pastel-b: #e1f5fe;
            --pastel-v: #f3e5f5;
            
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 20px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available; 
            overflow: hidden;
            padding-top: var(--safe-top);
        }

        html {
            height: -webkit-fill-available;
        }

        .serif-title {
            font-family: "Iowan Old Style", "Apple Garamond", "Baskerville", "Times New Roman", "Droid Serif", Times, "Source Serif Pro", serif;
            font-style: italic;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        /* View Container */
        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 0 1.5rem;
            position: relative;
        }

        .view.active {
            display: flex;
        }

        /* Layout Zones */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            flex-shrink: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 1.8rem;
            margin: 0;
            color: #d1d1d1;
        }

        .content-zone {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 0; 
            padding-bottom: 2rem;
            pointer-events: none; /* Let events pass through to player-view */
        }

        .footer-zone {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: calc(var(--safe-bottom) + 1.5rem);
            gap: 0.5rem;
            z-index: 10;
            pointer-events: none;
        }

        /* Elements */
        .nav-link {
            font-size: 0.85rem;
            color: #ffffff;
            text-decoration: none;
            cursor: pointer;
            background: var(--nav-bg);
            padding: 0.7rem 1.4rem;
            border-radius: 20px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
            pointer-events: auto; /* Re-enable for buttons */
        }

        .collections-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            overflow-y: auto;
            padding-bottom: calc(var(--safe-bottom) + 2rem);
        }

        .collection-card {
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            min-width: 100px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .collection-title {
            font-size: 1rem;
            color: #1a1a1a;
            font-weight: 600;
        }

        .collection-count {
            font-size: 0.6rem;
            color: rgba(0,0,0,0.5);
            text-transform: uppercase;
            font-weight: bold;
        }

        #phrase-display {
            font-size: 1.7rem;
            line-height: 1.5;
            max-width: 600px;
            color: #e0e0e0;
            font-weight: 400;
            transition: opacity 0.2s ease;
        }

        /* Stats & Meta */
        .meta-info {
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 3px;
        }

        .instruction-hint {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Editor Specifics */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            flex-grow: 1;
            min-height: 0;
            overflow-y: auto;
        }

        input#col-title {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border);
            color: #ffffff;
            font-size: 1.5rem;
            padding: 0.8rem 0;
            outline: none;
            flex-shrink: 0;
            font-family: inherit;
        }

        textarea {
            flex-grow: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: #d1d1d1;
            padding: 1.2rem;
            font-size: 1.15rem;
            border-radius: 12px;
            outline: none;
            line-height: 1.6;
            -webkit-appearance: none; 
            font-family: inherit;
            resize: vertical;
            min-height: 250px;
        }

        .actions {
            display: flex;
            gap: 1rem;
            padding: 1rem 0 calc(var(--safe-bottom) + 1rem);
            flex-shrink: 0;
            margin-top: auto;
        }

        .btn {
            flex: 1;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 1.2rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        .btn.danger {
            background: #441111;
            color: #ff8888;
            border: 1px solid #661111;
            box-shadow: none;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 4px;
            background: #555;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- HOME VIEW -->
    <div id="home-view" class="view active">
        <div class="header">
            <h1 class="serif-title">Echoes</h1>
            <div class="nav-link" onclick="openEditor()">+ New</div>
        </div>
        <div id="collections-list" class="collections-list"></div>
    </div>

    <!-- PLAYER VIEW -->
    <div id="player-view" class="view">
        <div class="progress-bar" id="progress"></div>
        <div class="header">
            <div class="nav-link" id="player-back-btn" onclick="showView('home')">← Back</div>
            <div class="nav-link" id="player-edit-btn" onclick="openEditor(currentCollectionId)">Edit</div>
        </div>
        
        <div class="content-zone">
            <div id="phrase-display">...</div>
        </div>
        
        <div class="footer-zone">
            <div class="meta-info" id="stats">0 / 0</div>
            <div class="instruction-hint">Tap Anywhere to Speak / Swipe to Move</div>
        </div>
    </div>

    <!-- EDITOR VIEW -->
    <div id="editor-view" class="view">
        <div class="header">
            <h1 id="editor-heading" class="serif-title" style="font-size: 1.4rem;">Collection</h1>
            <div class="nav-link" onclick="showView('home')">Cancel</div>
        </div>
        <div class="input-group">
            <input type="text" id="col-title" placeholder="Title" autocomplete="off">
            <textarea id="col-content" placeholder="Phrases (one per line)" autocomplete="off"></textarea>
        </div>
        <div class="actions">
            <button class="btn danger" id="delete-btn" onclick="deleteCollection()">Delete</button>
            <button class="btn" onclick="saveCollection()">Save Echo</button>
        </div>
    </div>

    <script>
        let collections = [];
        let currentCollectionId = null;
        let currentIndex = 0;
        const synth = window.speechSynthesis;
        
        let touchStartX = 0;
        let touchEndX = 0;

        const pastelColors = ['#fff9c4', '#f8bbd0', '#c8e6c9', '#e1f5fe', '#f3e5f5'];

        window.onload = () => {
            const saved = localStorage.getItem('morning_echo_v2');
            if (saved) {
                collections = JSON.parse(saved);
            } else {
                collections = [{
                    id: Date.now(),
                    title: "Fragments",
                    phrases: ["The privilege of a lifetime is to become who you truly are.", "Everything that irritates us about others can lead us to an understanding of ourselves.", "The dream is the small hidden door in the deepest sanctum of the soul."]
                }];
                saveToDisk();
            }
            renderHome();
            setupInteractions();
        };

        function setupInteractions() {
            const player = document.getElementById('player-view');

            player.addEventListener('touchstart', e => {
                // If touching a button, don't initiate swipe logic
                if (e.target.classList.contains('nav-link')) return;
                touchStartX = e.changedTouches[0].screenX;
            }, {passive: true});

            player.addEventListener('touchend', e => {
                if (e.target.classList.contains('nav-link')) return;
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, {passive: true});

            player.addEventListener('click', (e) => {
                // Ignore clicks on header buttons
                if (e.target.closest('.nav-link')) return;

                // Check if it was a tap and not a swipe
                if (Math.abs(touchEndX - touchStartX) < 10) {
                    const col = collections.find(c => c.id === currentCollectionId);
                    if (col && col.phrases[currentIndex]) {
                        speak(col.phrases[currentIndex]);
                    }
                }
            });
        }

        function handleSwipe() {
            const threshold = 50;
            if (touchEndX < touchStartX - threshold) navigate(1); 
            if (touchEndX > touchStartX + threshold) navigate(-1); 
        }

        function saveToDisk() {
            localStorage.setItem('morning_echo_v2', JSON.stringify(collections));
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`${viewId}-view`).classList.add('active');
            if (viewId === 'home') {
                renderHome();
                synth.cancel();
            }
            document.activeElement.blur();
        }

        function renderHome() {
            const list = document.getElementById('collections-list');
            list.innerHTML = '';
            collections.forEach((c, index) => {
                const card = document.createElement('div');
                card.className = 'collection-card';
                card.style.backgroundColor = pastelColors[index % pastelColors.length];
                card.onclick = () => startPlayer(c.id);
                card.innerHTML = `
                    <div class="collection-title">${c.title}</div>
                    <div class="collection-count">${c.phrases.length} items</div>
                `;
                list.appendChild(card);
            });
        }

        function openEditor(id = null) {
            currentCollectionId = id;
            const titleInput = document.getElementById('col-title');
            const contentInput = document.getElementById('col-content');
            const deleteBtn = document.getElementById('delete-btn');
            
            if (id) {
                const col = collections.find(c => c.id === id);
                titleInput.value = col.title;
                contentInput.value = col.phrases.join('\n');
                document.getElementById('editor-heading').innerText = "Edit Collection";
                deleteBtn.style.display = 'block';
            } else {
                titleInput.value = '';
                contentInput.value = '';
                document.getElementById('editor-heading').innerText = "New Collection";
                deleteBtn.style.display = 'none';
            }
            showView('editor');
        }

        function saveCollection() {
            const title = document.getElementById('col-title').value.trim() || "Untitled";
            const content = document.getElementById('col-content').value.trim();
            const phrases = content.split('\n')
                .map(p => p.trim())
                .filter(p => p.length > 0);

            if (currentCollectionId) {
                const idx = collections.findIndex(c => c.id === currentCollectionId);
                if (idx !== -1) collections[idx] = { ...collections[idx], title, phrases };
            } else {
                collections.push({ id: Date.now(), title, phrases });
            }
            
            saveToDisk();
            showView('home');
        }

        function deleteCollection() {
            if (!currentCollectionId) return;
            collections = collections.filter(c => c.id !== currentCollectionId);
            saveToDisk();
            showView('home');
        }

        function startPlayer(id) {
            currentCollectionId = id;
            currentIndex = 0; 
            const col = collections.find(c => c.id === id);
            
            if (col && col.phrases.length > 0) {
                document.getElementById('phrase-display').innerText = col.phrases[0];
            } else {
                document.getElementById('phrase-display').innerText = "No phrases found.";
            }
            
            updateStats();
            showView('player');
        }

        function navigate(direction) {
            const col = collections.find(c => c.id === currentCollectionId);
            if (!col || col.phrases.length === 0) return;

            const nextIdx = currentIndex + direction;
            
            if (nextIdx >= 0 && nextIdx < col.phrases.length) {
                currentIndex = nextIdx;
                const text = col.phrases[currentIndex];
                document.getElementById('phrase-display').style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('phrase-display').innerText = text;
                    document.getElementById('phrase-display').style.opacity = 1;
                    speak(text);
                }, 150);
            } else if (nextIdx >= col.phrases.length) {
                document.getElementById('phrase-display').innerText = "End of Collection";
                speak("End of Collection");
            }
            updateStats();
        }

        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85;
            utterance.pitch = 0.95;
            utterance.lang = 'en-US';
            synth.speak(utterance);
        }

        function updateStats() {
            const col = collections.find(c => c.id === currentCollectionId);
            if (!col) return;
            const count = col.phrases.length;
            const current = currentIndex + 1;
            document.getElementById('stats').innerText = `${current} / ${count}`;
            const progressWidth = count > 0 ? (current / count) * 100 : 0;
            document.getElementById('progress').style.width = `${progressWidth}%`;
        }
    </script>
</body>
</html>
